<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>AI 狼人杀</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100dvh;background:#080a1a;color:#f4f7ff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;touch-action:manipulation}
button,input,textarea,select{font:inherit;border:0;outline:0}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}

/* ======== Atmosphere ======== */
html[data-atmo="day"] #atmoOverlay{background:linear-gradient(180deg,rgba(244,200,106,.08),rgba(26,18,8,.55) 75%,rgba(26,18,8,.92))}
html[data-atmo="night"] #atmoOverlay{background:linear-gradient(180deg,rgba(74,58,255,.10),rgba(8,10,26,.60) 75%,rgba(8,10,26,.95))}
html[data-atmo="vote"] #atmoOverlay{background:linear-gradient(180deg,rgba(255,60,80,.12),rgba(26,8,8,.65) 75%,rgba(26,8,8,.95))}
html[data-atmo="ceremony"] #atmoOverlay{background:linear-gradient(180deg,rgba(120,50,255,.18),rgba(13,8,26,.70) 75%,rgba(13,8,26,.96))}
html[data-atmo="reveal"] #atmoOverlay{background:linear-gradient(180deg,rgba(255,200,50,.20),rgba(26,18,8,.60) 70%,rgba(26,18,8,.95))}
html[data-atmo="card"] #atmoOverlay{background:linear-gradient(180deg,rgba(160,90,255,.15),rgba(10,6,26,.70) 75%,rgba(10,6,26,.96))}
html[data-atmo="day"]{background:#1a1208}
html[data-atmo="night"]{background:#080a1a}
html[data-atmo="vote"]{background:#1a0808}
html[data-atmo="ceremony"]{background:#0d081a}
html[data-atmo="reveal"]{background:#1a1408}
html[data-atmo="card"]{background:#0a061a}

/* ======== Setup ======== */
#setupScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;justify-content:center;padding:24px 20px;background:radial-gradient(circle at 50% 18%,rgba(244,200,106,.16),transparent 34%),radial-gradient(circle at 20% 78%,rgba(74,58,255,.22),transparent 38%),linear-gradient(180deg,#080a1a,#0d1028 58%,#070814);overflow:auto}
#setupScreen:before{content:"";position:absolute;inset:0;z-index:0;background:linear-gradient(180deg,rgba(8,10,26,.01),rgba(8,10,26,.58));pointer-events:none}
#setupBgCards{position:absolute;inset:-8%;z-index:0;pointer-events:none;overflow:hidden;filter:saturate(1.08)}
#setupBgCards img{position:absolute;width:min(170px,34vw);border-radius:18px;opacity:.48;filter:blur(.08px) brightness(1.04) saturate(1.18);box-shadow:0 18px 50px rgba(0,0,0,.35);animation:cardFloat 12s ease-in-out infinite alternate}
#setupBgCards img:nth-child(1){left:5%;top:9%;transform:rotate(-14deg);animation-delay:-1s}
#setupBgCards img:nth-child(2){right:6%;top:10%;transform:rotate(12deg);animation-delay:-3s}
#setupBgCards img:nth-child(3){left:12%;bottom:8%;transform:rotate(10deg);animation-delay:-5s}
#setupBgCards img:nth-child(4){right:13%;bottom:9%;transform:rotate(-12deg);animation-delay:-7s}
#setupBgCards img:nth-child(5){left:42%;top:0%;transform:rotate(4deg);animation-delay:-9s}
#setupBgCards img:nth-child(6){left:43%;bottom:-3%;transform:rotate(-4deg);animation-delay:-11s}
@keyframes cardFloat{from{translate:0 -8px;scale:.98}to{translate:0 14px;scale:1.04}}
.setup-shell{position:relative;z-index:1;width:min(520px,100%);margin:0 auto}
#setupScreen h1{font-size:31px;text-align:center;margin-bottom:6px;letter-spacing:.04em;background:linear-gradient(135deg,#fff2bc,#f4c86a 42%,#77c3ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 12px 40px rgba(244,200,106,.18)}
#setupScreen .author{text-align:center;margin-bottom:8px;font-size:13px;color:#9ca6c8}
#setupScreen .author a{color:#f4c86a;text-decoration:none;font-weight:800;text-shadow:0 0 18px rgba(244,200,106,.25)}
#setupScreen .sub{text-align:center;color:#b2bbdc;font-size:13px;margin-bottom:20px;line-height:1.7}
.setup-card{background:linear-gradient(180deg,rgba(28,33,62,.82),rgba(14,17,38,.76));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(244,200,106,.16);border-radius:26px;padding:18px;margin-bottom:14px;box-shadow:0 24px 80px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08)}
.setup-card label{display:block;font-size:13px;color:#cdd5f2;margin-bottom:6px}
.setup-card input,.setup-card select{width:100%;color:#f4f7ff;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:12px}
.setup-card input:focus,.setup-card select:focus{border-color:rgba(244,200,106,.58);box-shadow:0 0 0 3px rgba(244,200,106,.13)}
.setup-card .row{display:flex;gap:10px}
.setup-card .row>*{flex:1}
.setup-card details{font-size:12px;color:#9ca6c8;margin-top:10px}
.setup-card details summary{cursor:pointer;padding:4px 0}
.setup-card details p{margin-top:6px;line-height:1.5}
.btn{display:block;width:100%;padding:14px;border-radius:16px;font-weight:800;font-size:16px;background:linear-gradient(135deg,#f7d47b,#ff9f66);color:#10121e;box-shadow:0 12px 28px rgba(244,167,77,.25)}
.btn.blue{background:linear-gradient(135deg,#77c3ff,#5eb0ff);color:#08111f}
.btn:disabled{opacity:.5}
.actions{display:flex;gap:10px;margin-top:8px}
.actions .btn{flex:1;font-size:14px;padding:12px}
.setup-secondary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.setup-secondary button{padding:10px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#cdd5f2;font-size:13px;cursor:pointer}
.provider-picks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;margin-bottom:10px}
.provider-picks button{padding:10px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#cdd5f2;font-size:13px;cursor:pointer}
.provider-picks button.active{background:rgba(244,200,106,.16);border-color:rgba(244,200,106,.48);color:#f4c86a;font-weight:800}

/* ======== Game Layout ======== */
#gameScreen{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10}
#topbar{position:relative;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:calc(8px + env(safe-area-inset-top)) 12px 8px;gap:8px;font-size:13px;background:linear-gradient(180deg,rgba(8,10,26,.92),rgba(8,10,26,.4));flex-shrink:0}
#topbar .pill{border:1px solid rgba(244,200,106,.32);color:#f4c86a;background:rgba(244,200,106,.08);border-radius:999px;padding:4px 10px;font-size:12px;white-space:nowrap}
#topbar .stats{display:flex;gap:10px;color:#9ca6c8;font-size:11px}
#topbar .stats b{color:#f4f7ff}
#topbar .link{cursor:pointer;color:#f4c86a;white-space:nowrap}

/* ======== Stage ======== */
#stageWrap{flex:1;position:relative;overflow:hidden}
#stageImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 25%;transition:opacity .25s;background:#080a1a}
#stageImg.system{opacity:1;object-fit:contain;object-position:center;padding:12%}
#stageImg.dead-focus{filter:grayscale(1) brightness(.55) contrast(1.15);opacity:.82}
#atmoOverlay{position:absolute;inset:0;z-index:12;pointer-events:none;transition:background .6s}
#ceremonyCard{position:absolute;inset:0;z-index:13;display:none;place-items:center;pointer-events:none}
#ceremonyCard.show{display:grid}
.card3d{width:min(260px,80vw);height:min(370px,110vw);perspective:800px;pointer-events:auto}
.card3d .inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card3d.flipped .inner{transform:rotateY(180deg)}
.card3d .front,.card3d .back{position:absolute;inset:0;border-radius:16px;display:grid;place-items:center;font-size:22px;font-weight:900;backface-visibility:hidden;border:2px solid rgba(244,200,106,.3)}
.card3d .front{background:linear-gradient(135deg,#2a1e4e,#1a1040);color:#f4c86a;box-shadow:0 0 40px rgba(120,50,255,.3)}
.card3d .back{transform:rotateY(180deg);background:linear-gradient(135deg,#3a2e5e,#2a204e);color:#f4f7ff;font-size:28px;border-color:rgba(255,215,0,.4);box-shadow:0 0 40px rgba(244,200,106,.2)}

/* ======== Dialog ======== */
#dialogBox{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:30px 14px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent 0%,rgba(8,10,26,.88) 30%,rgba(8,10,26,.96) 70%)}
#dialogInner{background:rgba(28,33,62,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px 16px;max-height:min(60dvh,420px);overflow-y:auto}
#dialogSpeaker{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
#dialogSpeaker .name{font-weight:700;font-size:15px}
#dialogSpeaker .status{font-size:11px;color:#9ca6c8;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:999px}
#dialogText{font-size:14px;line-height:1.6;color:#e8edff;min-height:2.2em;margin-bottom:10px;white-space:pre-line;word-break:break-word}
#dialogActions{display:flex;gap:8px;align-items:center}
#nextBtn{flex:1;padding:10px;border-radius:14px;font-weight:700;font-size:14px;background:linear-gradient(135deg,#f7d47b,#ff9f66);color:#10121e}
#nextBtn:disabled,.btn:disabled{opacity:.46;cursor:not-allowed;filter:grayscale(.45);box-shadow:none}
#logBtn,#tableReadBtn{padding:10px 12px;border-radius:14px;font-size:13px;color:#cdd5f2;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);white-space:nowrap}
#logBtn:active,#tableReadBtn:active{background:rgba(255,255,255,.14)}
#thinking{display:none;align-items:center;gap:8px;color:#9ca6c8;font-size:13px}
#thinking.show{display:flex}
.dot-pulse{display:flex;gap:4px}
.dot-pulse span{width:6px;height:6px;border-radius:50%;background:#9ca6c8;animation:pulse .8s infinite}
.dot-pulse span:nth-child(2){animation-delay:.15s}
.dot-pulse span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ======== Seat Bar ======== */
#seatBar{position:relative;z-index:15;display:flex;gap:4px;padding:8px 10px calc(4px + env(safe-area-inset-bottom));flex-shrink:0;background:linear-gradient(0deg,rgba(8,10,26,.92) 60%,transparent);overflow-x:auto}
.seat{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:40px;flex-shrink:0;padding:4px 6px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
.seat.active{border-color:rgba(244,200,106,.5);background:rgba(244,200,106,.08)}
.seat.dead{opacity:.35;filter:grayscale(.8)}
.seat .s-avatar{width:28px;height:28px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}
.seat .s-avatar.system-av{background:rgba(255,255,255,.08);display:grid;place-items:center;font-size:14px}
.seat .s-label{font-size:9px;color:#9ca6c8;white-space:nowrap}
.seat .s-badge{font-size:8px;padding:1px 4px;border-radius:999px}
.seat.me .s-avatar{border-color:#f4c86a}

/* ======== Log Drawer ======== */
#logDrawer{position:fixed;inset:0;z-index:150;display:none}
#logDrawer.show{display:block}
#logBackdrop{position:absolute;inset:0;background:rgba(3,4,10,.7);backdrop-filter:blur(6px)}
#logPanel{position:absolute;top:0;right:0;bottom:0;width:min(360px,85vw);background:#12162b;border-left:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.5);animation:slideIn .25s ease-out}
@keyframes slideIn{from{transform:translateX(100%)}}
#logPanel .log-header{display:flex;justify-content:space-between;align-items:center;padding:calc(14px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
#logPanel .log-header h3{font-size:17px}
#logPanel .log-header button{padding:8px 12px;border-radius:12px;background:rgba(255,255,255,.08);color:#cdd5f2;font-size:13px}
#logContent{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.log-entry{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.05);font-size:12px;line-height:1.5}
.log-entry b{color:#fff}
.log-entry .lt{color:#9ca6c8;font-size:10px;display:block;margin-bottom:2px}

/* ======== Action Modal ======== */
#actionModal{position:fixed;inset:0;z-index:160;display:none;place-items:center;padding:16px}
#actionModal.show{display:grid}
#actionBackdrop{position:absolute;inset:0;background:rgba(3,4,10,.72);backdrop-filter:blur(10px)}
#actionCard{position:relative;width:min(480px,100%);max-height:80dvh;overflow-y:auto;background:#12162b;border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.45);animation:fadeUp .25s ease-out}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}}
#actionCard h3{font-size:17px;margin-bottom:4px}
#actionCard .desc{font-size:12px;color:#9ca6c8;margin-bottom:12px;line-height:1.5}
#actionBody{min-height:60px}
.target-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.target-grid button{padding:12px 8px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#f4f7ff;font-size:14px;font-weight:600}
.target-grid button.selected{color:#10121e;background:linear-gradient(135deg,#f7d47b,#ff9f66);border-color:#f4c86a}
.target-grid button:disabled{opacity:.3}
.action-hint{margin-top:10px;font-size:12px;color:#9ca6c8;line-height:1.5;text-align:center}
.table-read-grid{display:grid;gap:8px}
.table-read-row{display:grid;grid-template-columns:70px 1fr 48px;gap:8px;align-items:center;font-size:12px;color:#cdd5f2}
.table-read-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.table-read-bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#74b9ff,#f7d47b,#ff5d73)}
.review-block{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-top:8px;font-size:12px;line-height:1.6;color:#cdd5f2}
.review-block b{color:#f4f7ff}
#actionCard textarea{width:100%;min-height:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;color:#f4f7ff;resize:none}
#actionCard textarea:focus{border-color:rgba(116,185,255,.5)}
#actionCard .btn{margin-top:12px}
.witch-actions{display:flex;gap:8px;margin-bottom:12px}
.witch-actions button{flex:1;padding:12px;border-radius:14px;text-align:center;font-weight:600;font-size:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f4f7ff}
.witch-actions button.active{background:rgba(116,185,255,.18);border-color:rgba(116,185,255,.4);color:#74b9ff}
.witch-actions button.danger.active{background:rgba(255,93,115,.18);border-color:rgba(255,93,115,.4);color:#ff5d73}
.persona-editor{display:flex;flex-direction:column;min-height:0;flex:1}
.persona-switcher{display:grid;grid-template-columns:74px 1fr 74px;gap:8px;align-items:center;margin-bottom:10px;flex-shrink:0}
.persona-switcher button{padding:10px 6px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#cdd5f2;font-size:12px}
.persona-current{text-align:center;font-size:18px;font-weight:900;color:#f4c86a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.persona-scroll{overflow-y:auto;min-height:0;flex:1;padding-right:2px;padding-bottom:10px}
.persona-portrait-wrap{display:grid;place-items:center;margin-bottom:12px;padding:12px;border-radius:20px;background:radial-gradient(circle at 50% 18%,rgba(244,200,106,.14),transparent 48%),rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.persona-preview{width:min(210px,58vw);height:min(300px,42dvh);border-radius:18px;object-fit:contain;object-position:center center;border:1px solid rgba(244,200,106,.35);background:rgba(5,7,18,.35);box-shadow:0 18px 50px rgba(0,0,0,.28)}
.persona-footer{flex-shrink:0;padding-top:10px;background:linear-gradient(180deg,rgba(18,22,43,0),#12162b 22%)}
.persona-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.persona-tools button{padding:10px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#cdd5f2;font-size:12px}
.persona-save{width:100%;padding:12px;border-radius:14px;background:linear-gradient(135deg,#f7d47b,#ff9f66);color:#10121e;font-weight:900;margin-top:8px}
.persona-note{font-size:12px;color:#9ca6c8;line-height:1.6;margin-top:8px}

/* ======== Toast ======== */
#toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%);z-index:180;padding:12px 16px;border-radius:14px;background:rgba(15,18,35,.96);border:1px solid rgba(255,255,255,.12);font-size:13px;max-width:380px;text-align:center;display:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
#toast.show{display:block}

/* ======== Asset Loader ======== */
#assetLoader{position:fixed;inset:0;z-index:220;display:none;place-items:center;padding:24px;background:rgba(5,7,18,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
#assetLoader.show{display:grid}
.loader-card{width:min(360px,92vw);padding:22px;border-radius:24px;background:linear-gradient(180deg,rgba(28,33,62,.9),rgba(13,16,36,.88));border:1px solid rgba(244,200,106,.18);box-shadow:0 22px 70px rgba(0,0,0,.48);text-align:center}
.loader-card h3{font-size:18px;margin-bottom:6px;color:#f4f7ff}
.loader-card p{font-size:12px;color:#9ca6c8;line-height:1.6;margin-bottom:14px}
.loader-bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08)}
#assetProgressBar{display:block;height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#77c3ff,#f4c86a,#ff9f66);transition:width .18s ease}
#assetProgressText{margin-top:10px;font-size:12px;color:#f4c86a;font-weight:800}

/* ======== Misc ======== */
.hidden{display:none!important}
#setupScreen.hidden{display:none!important}
</style>
</head>
<body>

<!-- ============ SETUP ============ -->
<div id="setupScreen">
  <div id="setupBgCards">
    <img src="狼人.png"><img src="村民.png"><img src="守卫.png"><img src="女巫.png"><img src="猎人.png"><img src="预言家.png">
  </div>
  <div class="setup-shell">
    <h1>明日方舟狼人杀（AI版）</h1>
    <div class="author">作者 <a href="https://space.bilibili.com/599298?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer">@不自动售货机</a></div>
    <p class="sub">10人标准局 · 3狼 · 4神 · 3民<br>输入兼容 OpenAI 格式的 API Key，和 9 名 AI 玩家开一局推理对抗。</p>
    <div class="setup-card">
      <label>接口预设</label>
      <div class="provider-picks">
        <button type="button" class="provider-pick active" data-provider="deepseek">DeepSeek</button>
        <button type="button" class="provider-pick" data-provider="openai">OpenAI</button>
        <button type="button" class="provider-pick" data-provider="custom">自定义</button>
      </div>
      <input id="apiProvider" type="hidden" value="deepseek">
      <label style="margin-top:10px">API Key</label>
      <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
      <div class="row" style="margin-top:10px">
        <div><label>Base URL</label><input id="baseUrl" value="https://api.deepseek.com"></div>
        <div><label>模型</label><input id="modelName" value="deepseek-v4-flash"></div>
      </div>
      <details>
        <summary>高级设置</summary>
        <p style="margin-top:6px"><label>AI 温度 <span id="tempVal">0.75</span></label><input id="tempSlider" type="range" min="0.1" max="1.0" step="0.05" value="0.75" style="width:100%"></p>
        <p style="margin-top:6px;color:#9ca6c8">如果浏览器直连失败，通常是接口不允许跨域请求。可换用支持 CORS 的 OpenAI 兼容网关。</p>
      </details>
    </div>
    <button class="btn" id="startBtn">开始游戏</button>
    <div class="setup-secondary">
      <button id="testApiBtn">测试连接</button>
      <button id="setupPersonaBtn">角色人设</button>
      <button id="showRulesBtn">查看规则</button>
    </div>
  </div>
</div>

<!-- ============ GAME ============ -->
<div id="gameScreen" class="hidden">
  <div id="topbar">
    <div class="pill" id="phasePill">准备</div>

function characterPool(){
  return CHARACTER_POOL.map(c=>{
    const o=CHARACTER_OVERRIDES[charKey(c)]||{};
    return {...c,baseName:charKey(c),name:String(o.name||c.name).slice(0,16),persona:String(o.persona||c.persona),customImg:o.customImg||null};
  });
}

function applyPersonaToCurrentPlayers(){
  S.players.forEach(p=>{
    const o=CHARACTER_OVERRIDES[p.baseName];
    const base=CHARACTER_POOL.find(c=>charKey(c)===p.baseName);
    if(!base)return;
    p.name=String(o?.name||base.name).slice(0,16);
    p.persona=String(o?.persona||base.persona);
    p.customImg=o?.customImg||null;
  });

}

function bulletLines(items){return items.filter(Boolean).map(x=>"· "+x).join("\n")}

function voteCounts(votes){const counts={};votes.forEach(v=>counts[v.to]=(counts[v.to]||0)+1);return counts}
function formatVoteBlock(votes,out,tied,max){
  const details=votes.map(v=>seatLabel(v.from)+" → "+seatLabel(v.to)+(v.reason?"\n  理由："+v.reason:""));
  const counts=Object.entries(voteCounts(votes)).sort((a,b)=>b[1]-a[1]).map(([s,c])=>seatLabel(s)+"："+c+"票");
  const result=tied&&tied.length>1?"最高票平票（"+tied.map(seatLabel).join("、")+" 各 "+max+" 票），无人被放逐。":seatLabel(out)+" 被放逐。";
  return "投票明细：\n"+bulletLines(details)+"\n\n票数统计：\n"+bulletLines(counts)+"\n\n结果：\n"+result;
}
function formatDeathReport(deaths){
  if(!deaths.length)return "昨夜平安夜，无人死亡。";
  return "昨夜死亡：\n"+bulletLines(deaths.map(seatLabel));

function requiredAssets(){

function setAssetProgress(done,total){
  const pct=total?Math.round(done/total*100):100;
  $("assetProgressBar").style.width=pct+"%";
  $("assetProgressText").textContent=pct+"%";
  $("assetLoaderDesc").textContent="正在加载素材（"+done+"/"+total+"）";
}

function preloadImages(urls){
  const list=[...new Set(urls)].filter(Boolean);
  let done=0;setAssetProgress(0,list.length);
  return Promise.all(list.map(src=>new Promise(resolve=>{
    const img=new Image();
    img.onload=img.onerror=()=>{done++;setAssetProgress(done,list.length);resolve()};
    img.src=src;
  })));
}

async function prepareAssets(){
  $("assetLoader").classList.add("show");
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));
  const started=Date.now();
  try{await preloadImages(requiredAssets());
    const left=500-(Date.now()-started);
    if(left>0)await new Promise(r=>setTimeout(r,left));
  }
  finally{$("assetLoader").classList.remove("show")}
}

async function prepareAssetsOnce(){
  if(localStorage.getItem(ASSET_CACHE_KEY)==="1")return;
  await prepareAssets();
  localStorage.setItem(ASSET_CACHE_KEY,"1");
}

// ===== SCENE QUEUE =====
function enqueue(scene){S.sceneQueue.push(scene)}
function clearQueue(){S.sceneQueue.length=0}

async function playQueue(){
  if(S.scenePlaying)return S.scenePlayingPromise;
  S.scenePlaying=true;
  S.scenePlayingPromise=(async()=>{
    try{
      while(S.sceneQueue.length>0&&!S.winner){
        const scene=S.sceneQueue.shift();
        await renderScene(scene);
      }
    }finally{
      S.scenePlaying=false;
      S.scenePlayingPromise=null;
      if(S.sceneQueue.length&&!S.winner)await playQueue();
    }
  })();
  return S.scenePlayingPromise;
}

function renderScene(scene){
  return new Promise(resolve=>{
    const img=$("stageImg");const spk=$("speakerName");const stt=$("speakerStatus");
    const txt=$("dialogText");const btn=$("nextBtn");const thk=$("thinking");
    const card=$("ceremonyCard");const card3d=$("card3d");

    card.classList.remove("show");card3d.classList.remove("flipped");
    thk.classList.remove("show");setSkipAiVisible(false);
    setNextState(scene.nextText||"确 定 ▸",false);
    img.classList.remove("dead-focus");

    setAtmo(scene.atmo||"night");
    renderSeatBar(scene.speakerSeat);

    // Portrait
    let src=null;
    if(scene.speakerSeat!=null){
      const p=pl(scene.speakerSeat);
      setStagePortrait(img,p,scene.atmo);
      src=S.portraits[p?.seat];
    }else if(scene.focusSeat!=null){
      const p=pl(scene.focusSeat);
      setStagePortrait(img,p,scene.atmo);
      src=S.portraits[p?.seat];
    }else if(scene.type==="system"||scene.type==="ceremony"){
      setStagePortrait(img,null,scene.atmo);
    }
    if(scene.deadFocus)img.classList.add("dead-focus");

    // Card ceremony
    if(scene.type==="card_flip"){
      card.classList.add("show");
      card3d.classList.remove("flipped");
      setNextState("翻开身份 ▸",false);
      S.sceneResolve=resolve;
      let flipped=false;
      const flip=()=>{
        if(flipped)return;
        flipped=true;
        card3d.classList.add("flipped");
        if(scene.roleCardImage){$("cardBackImg").src=scene.roleCardImage;$("cardBackImg").style.display="block";$("cardBackText").style.display="none";}
        else{$("cardBackImg").style.display="none";$("cardBackText").style.display="block";$("cardBackText").textContent=scene.revealText||"";}
        setNextState("翻牌中…",true);
        setTimeout(()=>{
          setNextState("确认身份 ▸",false);
          btn.onclick=()=>{card3d.onclick=null;S.sceneResolve=null;resolve()};
          card3d.onclick=()=>btn.click();
        },900);
      };
      btn.onclick=flip;
      card3d.onclick=()=>btn.click();
      return;
    }else if(scene.type==="reveal"){
      card.classList.add("show");
      card3d.classList.add("flipped");
      if(scene.roleCardImage){$("cardBackImg").src=scene.roleCardImage;$("cardBackImg").style.display="block";$("cardBackText").style.display="none";$("cardBackText").textContent="";}
      else{$("cardBackImg").style.display="none";$("cardBackText").style.display="block";$("cardBackText").textContent=scene.revealText||"";}
    }

    // Text
    spk.textContent=scene.title||"系统";
    txt.textContent=scene.text||"";
    stt.textContent=scene.status||"";

    // Log
    if(scene.log!==false&&scene.text){
      addLog(scene.type||"system",scene.title||"系统",scene.text,scene.visible||"public");
    }

    // Pre-generate for speech scenes (trigger AI call while showing previous scene)
    if(scene._preload){
      scene._preload().catch(()=>{});
    }

    btn.onclick=()=>{
      if(scene._onNext){
        const r=scene._onNext(resolve);
        if(r===true)return; // scene handled, don't auto-resolve
      }
      S.sceneResolve=null;
      resolve();
    };
    S.sceneResolve=resolve;
  });
}

function waitTap(){

    const handler=()=>{
      btn.removeEventListener("click",handler);
      S.sceneResolve=null;

    S.sceneResolve=resolve;
  });
}

function humanLeakWarning(text){
  const t=String(text||"");
  const patterns=[/狼同伴|狼队友|队友是|我们狼|昨晚.*刀|刀了|刀口是|我.*守了|守护了|昨晚.*守|我.*救了|我.*毒了|解药|毒药|我昨晚验|我验了|我查验了|查验结果/];
  if(!patterns.some(re=>re.test(t)))return true;
  return confirm("这段话可能公开暴露夜间私密信息或狼队信息。确定要这样发送吗？");
}

function personaRuleWarning(text){
  const t=String(text||"");
  return /(狼人|预言家|女巫|猎人|守卫|村民|身份|阵营|查验|毒药|解药|守护|狼队|队友|刀口|胜利条件|规则)/.test(t);
}

async function selectTarget(title,desc,candidates,allowSkip=false){
  const html=`<div class="target-grid">${candidates.map(p=>`<button data-s="${p.seat}"><span style="font-size:16px">${p.seat}号</span><br><span style="font-size:11px;color:#9ca6c8">${esc(p.name)}</span></button>`).join("")}</div>${allowSkip?'<button id="modalSkipBtn" style="width:100%;margin-top:8px;padding:10px;border-radius:14px;background:rgba(255,255,255,.05);color:#9ca6c8;border:1px solid rgba(255,255,255,.08)">跳过</button>':''}<div class="action-hint">先选择目标，再确认。不可用时按钮会保持灰色。</div>`;
  return new Promise(resolve=>{
    showAction(title,desc,html).then(()=>{});
    const grid=$("actionBody").querySelector(".target-grid");
    const confirmBtn=document.createElement("button");
    confirmBtn.className="btn";confirmBtn.textContent="请选择目标";confirmBtn.disabled=true;
    confirmBtn.onclick=()=>{
      const sel=$("actionBody").querySelector(".target-grid .selected");
      if(sel){hideAction();resolve(Number(sel.dataset.s))}
      else{toast("请选择一名玩家")}
    };
    $("actionBody").appendChild(confirmBtn);
    if(grid)grid.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      grid.querySelectorAll("button").forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
      confirmBtn.disabled=false;
      confirmBtn.textContent="确 认";
    });
    if(allowSkip)$("modalSkipBtn")?.addEventListener("click",()=>{hideAction();resolve(null)});
  });
}

  const summary=watchList?"你目前更在意的位置："+watchList:"暂无特别在意的位置";

      `<div style="font-size:12px;padding:5px 8px;border-radius:8px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);line-height:1.4"><b>${esc(l.title||"")}</b> ${esc(l.text||"")}</div>`

      if(!humanLeakWarning(t))return;
      hideAction();resolve(t.slice(0,220));

async function inputLastWords(p){
  if(p.isHuman){
    return new Promise(resolve=>{
      const html=`<textarea id="lastWordsInput" placeholder="输入遗言，可公开身份、报验人或交代票型..." style="min-height:90px"></textarea>`;
      showAction("你的遗言","你已经出局，这段话会公开给所有玩家。",html);
      const btn=document.createElement("button");
      btn.className="btn";btn.textContent="发表遗言";
      btn.onclick=()=>{
        const t=$("lastWordsInput")?.value?.trim()||"我没什么更多信息，大家看票型和发言继续盘。";
        if(!humanLeakWarning(t))return;
        hideAction();resolve(t.slice(0,180));
      };
      $("actionBody").appendChild(btn);
    });
  }
  const fb={speech:fallbackLastWords(p)};
  setInlineBusy("系统","正在整理"+playerLabel(p)+"的遗言，请稍等。","vote",p.seat);
  let ans=fb;
  try{
    ans=await aiJson(p,"你已出局，请发表一句遗言。不要泄露夜间私密行动、队友、刀口、守护、用药等不该公开的信息。只能基于公开事件、自己的公开立场和票型交代。输出{\"speech\":\"遗言\"}",fb);
  }finally{
    clearInlineBusy();
  }
  let speech=String(ans.speech||fb.speech).slice(0,180);
  if(isUnsafeSpeech(p,speech)||hasClaimLogicContradiction(p,speech)||referencesUnspokenToday(speech))speech=fb.speech;
  return speech;
}

function fallbackLastWords(p){
  if(p.role==="werewolf")return "我这轮被推出去，至少看清是谁顺势跟票。别只看结果，复盘一下最后两票是谁在补刀。";
  if(p.role==="seer"&&p.checked.length){const c=p.checked[p.checked.length-1];return "我留下的信息是："+seatLabel(c.seat)+"偏"+c.result+"。后面按票型和这个视角继续盘，不要被带散。";}
  if(p.role==="witch")return "我不把夜间细节摊开。你们继续看谁在抢定义、谁从我出局里收益最大。";
  if(p.role==="hunter")return "我出局后你们重点看推动我出局的人，尤其是临门跟票的位置。";
  if(p.role==="guard")return "我不交代夜间细节。后面按公开票型走，别让狼用平安夜或死亡结果倒推节奏。";
  return "我没有夜间信息。大家继续看发言链和票型，尤其注意最后跟票和强行归票的人。";
}

async function witchAction(w,killed){
  const candidates=alive().filter(p=>p.seat!==w.seat);
  let save=false,poison=null;
  let poisonMode=false;
  const html=()=>`<p style="font-size:13px;color:#9ca6c8;margin-bottom:10px">${killed?"今晚被杀："+seatLabel(killed):"无明确刀口"} · 解药${w.witch.antidote?"可用":"已用"} · 毒药${w.witch.poison?"可用":"已用"}</p>
  <div class="witch-actions"><button id="wsave" class="${save?'active':''}" ${!w.witch.antidote||!killed?'disabled':''}>💊 ${save?'已救':'使用解药'}</button>
  <button id="wskip" class="${!save&&!poison?'active':''}">跳过</button>
  <button id="wpoison" class="danger ${poisonMode||poison?'active':''}" ${!w.witch.poison?'disabled':''}>☠️ ${poison?'已选':'使用毒药'}</button></div>
  <div class="target-grid">${candidates.map(p=>`<button class="poison-target ${poison===p.seat?'selected':''}" data-s="${p.seat}" ${!w.witch.poison?'disabled':''}>毒 ${p.seat}号</button>`).join("")}</div>`;
  return new Promise(resolve=>{
    showAction("女巫行动","选择今晚的行动。",html()).then(()=>{});
    const render=()=>{$("actionBody").innerHTML=html();bindWitch()};
    const bindWitch=()=>{
      $("wsave")?.addEventListener("click",()=>{save=!save;if(save){poison=null;poisonMode=false}render()});
      $("wskip")?.addEventListener("click",()=>{save=false;poison=null;poisonMode=false;render()});
      $("wpoison")?.addEventListener("click",()=>{poisonMode=!poisonMode;if(poisonMode)save=false;else poison=null;render()});
      $("actionBody").querySelectorAll(".poison-target").forEach(b=>b.onclick=()=>{
        poison=Number(b.dataset.s);poisonMode=true;save=false;render();

// ===== AI =====
function chatCompletionsEndpoint(baseUrl){
  const url=String(baseUrl||"").trim().replace(/\/+$/,
    "");
  if(/\/chat\/completions$/i.test(url))return url;
  if(/\/v1$/i.test(url))return url+"/chat/completions";
  return url+"/v1/chat/completions";
}

function isJsonModeUnsupportedError(status,text){
  if(![400,404,422].includes(Number(status)))return false;
  return /response_format|json_object|json mode|unsupported|not support|不支持/i.test(String(text||""));
}

async function callDeepSeek(messages,jsonMode){
  const body={model:S.model,messages,temperature:S.temperature};
  if(jsonMode&&!S.jsonModeUnsupported)body.response_format={type:"json_object"};
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),AI_TIMEOUT_MS);
  let res;
  const endpoint=chatCompletionsEndpoint(S.baseUrl);
  try{
    res=await fetch(endpoint,{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.apiKey},
    body:JSON.stringify(body),signal:controller.signal
    });
  }catch(e){
    if(e?.name==="AbortError")throw new Error("AI响应超时，请稍后重试");
    const msg=String(e?.message||"");
    if(msg.includes("Load failed")||msg.includes("Failed to fetch"))throw new Error("API 请求被拦截（跨域/网络），可尝试使用后端转发或更换 API 端点");
    throw e;
  }finally{clearTimeout(timer)}
  if(!res.ok){
    const t=await res.text().catch(()=>"");
    if(jsonMode&&!S.jsonModeUnsupported&&isJsonModeUnsupportedError(res.status,t)){
      S.jsonModeUnsupported=true;
      addLog("system","接口兼容提示","当前接口不支持 response_format，已自动改用提示词 JSON 模式。","private");
      return callDeepSeek(messages,false);
    }
    throw new Error("API "+res.status+"："+t.slice(0,160))
  }
  const d=await res.json();return d.choices?.[0]?.message?.content?.trim()||"";
}

function parseJson(t,fb){
  try{return JSON.parse(t)}catch(_){}
  const m=t.match(/\{[\s\S]*\}/);if(m)try{return JSON.parse(m[0])}catch(_){}
  return fb;
}

async function aiJson(p,task,fb){
  if(!S.apiKey)return fb;
  try{
    const msgs=buildMsgs(p,task);
    const totalLen=msgs.reduce((s,m)=>s+m.content.length,0);
    if(totalLen>5000){msgs[1].content=msgs[1].content.slice(0,5000);}
    const t=await callDeepSeek(msgs,true);
    return parseJson(t,fb)
  }
  catch(e){addLog("system","AI错误",String(e.message||e).slice(0,180),"private");return fb}
}

async function retryAI(p,task,fb,retries=2){
  for(let i=0;i<=retries;i++){
    const r=await aiJson(p,task,fb);
    if(r!==fb||i>=retries)return r;
    await new Promise(r=>setTimeout(r,800));
  }
  return fb;
}

function aiPick(p,candidates,preferSuspicion=true){
  if(!candidates.length)return null;
  const s=[...candidates].sort((a,b)=>(preferSuspicion?((p.suspicion[b.seat]||.35)-(p.suspicion[a.seat]||.35)):Math.random()-.5));
  return s[0].seat;
}

function claimRoleLabel(role){
  const map={seer:"预言家",witch:"女巫",hunter:"猎人",guard:"守卫",villager:"村民",werewolf:"狼人",wolf:"狼人",unknown:"未知"};
  return map[String(role||"").toLowerCase()]||String(role||"未知");
}

function claimsSummary(){
  const recent=S.claims.slice(-14);
  if(!recent.length)return "暂无公开身份声明。";
  return recent.map(c=>{
    const who=seatLabel(c.from);
    if(c.type==="role_claim")return "第"+c.day+"天 "+who+"声称自己是"+claimRoleLabel(c.result)+"。";
    if(c.type==="seer_check")return "第"+c.day+"天 "+who+"声称查验"+seatLabel(c.target)+"是"+c.result+"。";
    if(c.type==="claim_intent")return "第"+c.day+"天 "+who+"以"+claimRoleLabel(c.result)+"身份发言。";
    return "第"+c.day+"天 "+who+"声明"+String(c.type||"信息")+(c.target?"，目标"+seatLabel(c.target):"")+(c.result?"，结果"+claimRoleLabel(c.result):"")+"。";
  }).join("\n");
}

function nightInfoBoundary(){

async function startNight(){

async function wolfIntroPhase(){
  if(S.day!==1||S._wolfRevealed)return;
  const wolves=S.players.filter(p=>p.role==="werewolf");
  if(!wolves.length)return;
  S._wolfRevealed=true;
  const allWlist=wolves.map(playerLabel).join("、");
  wolves.forEach(w=>{w.privateInfo.push("狼队成员："+allWlist+"。");});
  const humanWolf=wolves.find(w=>w.isHuman);
  if(humanWolf){
    const wlist=wolves.filter(w=>w.seat!==humanWolf.seat).map(playerLabel).join("、")||"无";
    privateDialog("狼人请睁眼。你的狼同伴是："+wlist+"。本阶段只确认同伴，随后进入夜间行动。","狼队确认","night");
  }
  await playQueue();
}

async function guardPhase(){
  setPhase("guard");
  const g=S.players.find(p=>p.alive&&p.role==="guard");
  if(!g)return;
  if(g.isHuman){
    const candidates=alive().filter(p=>p.seat!==g.lastProtected);
    const seat=await selectTarget("守卫行动","选择守护的玩家（不能连守同一人）。",candidates);
    S.night.guardTarget=seat;g.lastProtected=seat;
    privateDialog("你守护了"+seatLabel(seat)+"。","守卫行动","night");
  }else{
    setInlineBusy("系统","守卫正在行动...","night");
    const candidates=alive().filter(p=>p.seat!==g.lastProtected);
    let seat=aiPick(g,candidates,false);
    if(S.aiMode!=="save"){
      const ans=await retryAI(g,nightInfoBoundary()+"你是守卫，请根据当前可见信息选择今晚守护目标。不能连续守同一人。输出{\"target\":座位号,\"reason\":\"理由\"}",{target:seat,reason:""},1);
      if(candidates.some(p=>p.seat===Number(ans.target)))seat=Number(ans.target);
    }
    S.night.guardTarget=seat;g.lastProtected=seat;
    g.privateInfo.push("第"+S.day+"夜守护"+seatLabel(seat)+"。");
    clearInlineBusy();
  }
}

async function wolfPhase(){
  setPhase("wolf");
  const wolves=S.players.filter(p=>p.alive&&p.role==="werewolf");
  if(!wolves.length)return;
  const candidates=alive().filter(p=>p.role!=="werewolf");
  const hw=wolves.find(p=>p.isHuman);
  // Wolf team discussion: each alive AI wolf gives a brief suggestion
  const aiWolves=wolves.filter(w=>!w.isHuman);
  let suggestions=[];
  if(S.aiMode!=="save"&&aiWolves.length){
    setInlineBusy("系统","狼人正在分别提出刀口建议（0/"+aiWolves.length+"）...","night");
    let done=0;
    const boundary=nightInfoBoundary();
    const results=await Promise.all(aiWolves.map(async aw=>{
      const ans=await retryAI(aw,boundary+"你是狼人，请简单建议今晚刀谁，一句话。不要刀狼同伴。输出{\"target\":座位号,\"reason\":\"一句话理由\"}",{target:aiPick(aw,candidates,false),reason:""},1);
      done++;
      setInlineBusy("系统","狼人正在分别提出刀口建议（"+done+"/"+aiWolves.length+"）...","night");
      if(candidates.some(p=>p.seat===Number(ans.target)))return {from:aw.seat,target:Number(ans.target),reason:String(ans.reason||"").slice(0,40)};
      return null;
    }));
    suggestions=results.filter(Boolean);
    clearInlineBusy();
  }
  if(hw){
    if(suggestions.length){
      privateDialog(formatWolfSuggestions(suggestions),"狼队商量","night");
    }else{
      privateDialog("狼队正在商量刀口，由你最终决定。","狼队商量","night");
    }
    await playQueue();
    const seat=await selectTarget("狼人行动","选择今晚击杀的目标。",candidates);
    S.night.wolfTarget=seat;
    privateDialog("狼队选择击杀"+seatLabel(seat)+"。","狼人行动","night");
  }else{
    setInlineBusy("系统","狼人正在行动...","night");
    let seat=null;
    if(suggestions.length){
      const counts={};suggestions.forEach(s=>{counts[s.target]=(counts[s.target]||0)+1});
      const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      seat=Number(sorted[0][0]);
    }
    if(!seat)seat=aiPick(wolves[0],candidates,false);
    if(S.aiMode!=="save"&&!suggestions.length){
      const ans=await retryAI(wolves[0],nightInfoBoundary()+"你代表狼队选择今晚刀口。优先考虑疑似神职、强势带队好人、或能制造白天推人空间的目标；首夜不能引用尚未发生的发言表现。不要刀狼同伴。输出{\"target\":座位号,\"reason\":\"理由\"}",{target:seat,reason:""},1);
      if(candidates.some(p=>p.seat===Number(ans.target)))seat=Number(ans.target);
    }
    S.night.wolfTarget=seat;
    wolves.forEach(w=>w.privateInfo.push("第"+S.day+"夜刀口："+seatLabel(seat)+"。"));
    clearInlineBusy();
  }
}

async function seerPhase(){
  setPhase("seer");
  const s=S.players.find(p=>p.alive&&p.role==="seer");
  if(!s)return;
  const checked=new Set(s.checked.map(c=>c.seat));
  const candidates=alive().filter(p=>p.seat!==s.seat&&!checked.has(p.seat));
  if(!candidates.length)return;
  if(s.isHuman){
    await playQueue();
    const seat=await selectTarget("预言家行动","选择查验的玩家。",candidates);
    applySeerCheck(s,seat);S.night.seerTarget=seat;
    const target=pl(seat);const result=target.role==="werewolf"?"狼人":"好人";
    enqueue({type:"reveal",title:"查验结果",text:seatLabel(seat)+" 的阵营是「"+result+"」。",status:"仅你可见",atmo:"reveal",visible:"private",log:true,roleCardImage:target.role==="werewolf"?CHECK_CARD_IMAGES.wolf:CHECK_CARD_IMAGES.good,revealText:result});
  }else{
    setInlineBusy("系统","预言家正在行动...","night");
    let seat=aiPick(s,candidates,true);
    if(S.aiMode!=="save"){
      const ans=await retryAI(s,nightInfoBoundary()+"你是预言家，请选择今晚查验目标。后续夜晚可优先查强势带队、对跳、票型异常或能定义局势的人；首夜只能盲查或按座位风险选择。不要重复查验。输出{\"target\":座位号,\"reason\":\"理由\"}",{target:seat,reason:""},1);
      if(candidates.some(p=>p.seat===Number(ans.target)))seat=Number(ans.target);
    }
    applySeerCheck(s,seat);S.night.seerTarget=seat;
    clearInlineBusy();
  }
}

function applySeerCheck(s,seat){
  const target=pl(seat);
  const result=target.role==="werewolf"?"狼人":"好人";
  s.checked.push({seat,result,day:S.day});
  s.privateInfo.push("第"+S.day+"夜查验"+seatLabel(seat)+"："+result+"。");
  s.suspicion[seat]=result==="狼人"?0.96:0.08;
}

function firstNightSafeWolfTarget(){
  const human=me();
  if(!human)return null;
  const candidates=alive().filter(p=>p.seat!==human.seat&&p.role!=="werewolf"&&p.seat!==S.night.witchPoisonTarget);
  if(!candidates.length)return null;
  const wolves=alive().filter(p=>p.role==="werewolf");
  const picker=wolves[0]||candidates[0];
  return aiPick(picker,candidates,false)||candidates[0].seat;
}

function protectHumanFirstNight(deaths,causes){
  const human=me();
  if(S.day!==1||!human||!deaths.has(human.seat))return;
  const originalCauses={...causes};
  deaths.delete(human.seat);
  delete causes[human.seat];

  if(S.night.witchPoisonTarget===human.seat){
    S.night.witchPoisonTarget=null;
  }

  if(S.night.wolfTarget===human.seat){
    const newTarget=firstNightSafeWolfTarget();
    S.night.wolfTarget=newTarget;
    if(newTarget){
      const guarded=S.night.guardTarget===newTarget;
      const saved=S.night.witchSave;
      if(guarded&&saved){deaths.add(newTarget);causes[newTarget]="双重保护失效"}
      else if(!guarded&&!saved){deaths.add(newTarget);causes[newTarget]="狼人击杀"}
      else delete causes[newTarget];
    }
  }

  addLog("system","首夜保护","首夜保护已生效，避免你在第一晚直接出局。原风险："+(originalCauses[human.seat]||"未知")+"。","private");
}

async function witchPhase(){
  setPhase("witch");
  const w=S.players.find(p=>p.alive&&p.role==="witch");
  if(!w)return;
  const killed=S.night.wolfTarget;
  if(w.isHuman){
    await playQueue();
    const {save,poison}=await witchAction(w,killed);
    if(save&&w.witch.antidote){S.night.witchSave=true;w.witch.antidote=false;privateDialog("你使用解药救了"+seatLabel(killed)+"。","女巫行动")}
    if(poison&&w.witch.poison){S.night.witchPoisonTarget=poison;w.witch.poison=false;privateDialog("你使用毒药毒了"+seatLabel(poison)+"。","女巫行动")}
  }else{
    setInlineBusy("系统","女巫正在行动...","night");
    let decision={action:"none",target:null,reason:""};
    const poisonCandidates=alive().filter(p=>p.seat!==w.seat);
    if(S.aiMode!=="save")decision=await retryAI(w,nightInfoBoundary()+"你是女巫。今晚刀口是"+(killed?seatLabel(killed):"无")+"。解药"+(w.witch.antidote?"可用":"已用")+"，毒药"+(w.witch.poison?"可用":"已用")+"。请选择 save/poison/none，救人与毒人互斥。输出{\"action\":\"save/poison/none\",\"target\":座位号|null,\"reason\":\"理由\"}",decision,1);
    const action=String(decision.action||"").toLowerCase();
    const wantsSave=action==="save"||action.includes("救");
    const wantsPoison=!wantsSave&&(action==="poison"||action.includes("毒"));
    let witchResult="";
    if(w.witch.antidote&&killed&&(wantsSave||(!action&&S.day<=1))){S.night.witchSave=true;w.witch.antidote=false;w.privateInfo.push("第"+S.day+"夜救了"+seatLabel(killed)+"。");witchResult="使用解药救了"+seatLabel(killed);}
    if(w.witch.poison&&wantsPoison&&poisonCandidates.some(p=>p.seat===Number(decision.target))){S.night.witchPoisonTarget=Number(decision.target);w.witch.poison=false;w.privateInfo.push("第"+S.day+"夜毒了"+seatLabel(decision.target)+"。");witchResult="使用毒药毒了"+seatLabel(decision.target);}
    else if(w.witch.poison&&S.aiMode==="save"&&S.day>=2){const target=aiPick(w,poisonCandidates,true);if(target&&(w.suspicion[target]||0)>.68){S.night.witchPoisonTarget=target;w.witch.poison=false;w.privateInfo.push("第"+S.day+"夜毒了"+seatLabel(target)+"。");witchResult="使用毒药毒了"+seatLabel(target);}}
    clearInlineBusy();
  }
}

function resolveNight(){
  const deaths=new Set(),causes={};
  const killed=S.night.wolfTarget;
  if(killed){
    const guarded=S.night.guardTarget===killed;
    const saved=S.night.witchSave;
    if(guarded&&saved){deaths.add(killed);causes[killed]="双重保护失效"}
    else if(!guarded&&!saved){deaths.add(killed);causes[killed]="狼人击杀"}
  }
  if(S.night.witchPoisonTarget){deaths.add(S.night.witchPoisonTarget);causes[S.night.witchPoisonTarget]="女巫毒杀"}
  protectHumanFirstNight(deaths,causes);
  S.night.deaths=[...deaths];S.night.deathCauses=causes;
  deaths.forEach(s=>killPlayer(s,causes[s]));
}

async function startDay(){
  setPhase("day");
  const deaths=S.night.deaths;
  dialog(formatDeathReport(deaths),"天亮了","","day","system");
  await playQueue();
  for(const seat of deaths){
    const p=pl(seat);if(!p)continue;
    const lw=await inputLastWords(p);
    dialog(lw,seatLabel(seat)+"遗言","","day","system",seat,true);
    await playQueue();
  }
  await handleDeathSkills(deaths,"night");
  if(checkWin())return;
  await speechesPhase();
}

async function speechesPhase(){
  setPhase("speech");
  dialog("白天发言开始，存活玩家依次发言。","系统","","day","system");
  await playQueue();
  const img=$("stageImg");const spk=$("speakerName");const stt=$("speakerStatus");
  const txt=$("dialogText");const btn=$("nextBtn");const thk=$("thinking");
  const baseOrder=alive().sort((a,b)=>a.seat-b.seat);
  const nightDeaths=S.night?.deaths||[];
  let startSeat=S.day===1?baseOrder[Math.floor(Math.random()*baseOrder.length)]?.seat:nextAliveSeatAfter(nightDeaths[0]||0);
  const order=rotateFrom(baseOrder,startSeat);
  S.speechContext={day:S.day,spoken:[],remaining:order.map(p=>p.seat),current:null,index:0,total:order.length};
  addLog("system","发言顺序","第"+S.day+"天从"+seatLabel(startSeat)+"开始："+order.map(playerLabel).join("、"),"public");
  for(const p of order){
    if(S.winner)return;
    S.speechContext.current=p.seat;
    S.speechContext.index=S.speechContext.spoken.length+1;
    S.speechContext.remaining=order.map(x=>x.seat).filter(s=>!S.speechContext.spoken.includes(s)&&s!==p.seat);
    if(p.isHuman){
      setSkipAiVisible(false);
      const speech=await inputSpeech();
      addLog("speech",playerLabel(me())+"发言（你）",speech,"speech");
      detectClaimsFromSpeech(me(),speech);
      updateBeliefsFromSpeech(me(),speech,null);
      S.speechContext.spoken.push(p.seat);
      spk.textContent=playerLabel(me())+"（你）";
      txt.textContent=simplifyJargon(speech);
      stt.textContent="存活";
      setStagePortrait(img,me(),"day");
      renderSeatBar(me().seat);
      setNextState("下一位 ▸",false);
      await new Promise(r=>{btn.onclick=()=>{r()}});
    }else{
      // Direct render speaker scene
      spk.textContent=playerLabel(p);
      txt.textContent="正在思考...";
      stt.textContent="思考中";
      if(p){img.className="";img.src=portraitSrc(p)}
      else{img.className="system";img.src="系统.png"}
      renderSeatBar(p.seat);
      btn.onclick=null;
      btn.disabled=true;
      thk.classList.add("show");
      setNextState("思考中…",true);
      let skipResolve=null;
      const skipPromise=new Promise(resolve=>{skipResolve=resolve});
      setSkipAiVisible(true,()=>{setSkipAiVisible(false);skipResolve({skipped:true})});
      const fb={speech:fallbackSpeech(p),voteLean:aiPick(p,alive().filter(x=>x.seat!==p.seat),true),note:"",voteReason:""};
      const useAI=S.aiMode!=="save"||p.role==="werewolf"||p.role==="seer";
      const aiPromise=useAI?retryAI(p,buildSpeechTask(p),fb):Promise.resolve(fb);
      let ans=await Promise.race([aiPromise,skipPromise]);
      if(ans?.skipped)ans=fb;
      let speech=String(ans.speech||fb.speech).slice(0,220);
      if(useAI&&(isUnsafeSpeech(p,speech)||referencesUnspokenToday(speech)||hasClaimLogicContradiction(p,speech))){
        const retry=await retryAI(p,"上一条发言不符合公开发言要求：要么泄露了私密信息，要么评价了尚未发言的玩家，要么存在身份逻辑矛盾（例如自己声称唯一身份又认证别人也是该唯一身份，或把查验结果一致当作身份证明）。请重写为安全公开发言：只能谈公开结果、已发言玩家、历史票型和收益分析；不要说我救/毒/守/刀/验了谁；不要说尚未发言的人发言少、刚才说过、站边太快或前后矛盾。输出同样JSON。",fb,1);
        ans=retry;
        speech=String(ans.speech||fb.speech).slice(0,220);
      }
      if(hasClaimLogicContradiction(p,speech))speech="我不能直接把别人的说法当作身份证明。2号的遗言和部分信息对得上，但这不是他一定是真预言家的理由。今天先看谁借这个结论强行带票，投票倾向我后面会明确。";
      if(isUnsafeSpeech(p,speech)||referencesUnspokenToday(speech))speech=safeSpeechFallback(p);
      const note=String(ans.note||"").slice(0,300);
      const voteReason=sanitizePublicReason(p,Number(ans.voteLean)||fb.voteLean,String(ans.voteReason||"调查中"));
      p.voteLean=Number(ans.voteLean)||fb.voteLean;
      p.voteReason=voteReason;
      setSkipAiVisible(false);
      thk.classList.remove("show");setNextState("下一位 ▸",false);
      txt.textContent=simplifyJargon(speech);
      stt.textContent="存活";
      btn.disabled=false;
      addLog("speech",playerLabel(p),speech,"speech");
      if(note)addLog("system",playerLabel(p)+"临场草稿",note,"debug");
      // Update beliefs based on content
      recordAIState(p,ans,speech);
      updateBeliefsFromSpeech(p,speech,p.voteLean,voteReason);
      S.speechContext.spoken.push(p.seat);
      await new Promise(r=>{btn.onclick=()=>{r()}});
    }
  }
  await votePhase();
}

function fallbackSpeech(p){
  const top=Number(Object.entries(p.suspicion).filter(([s])=>pl(s)?.alive).sort((a,b)=>b[1]-a[1])[0]?.[0]||alive().find(x=>x.seat!==p.seat)?.seat);
  const sp=(S.speechContext?.spoken||[]).length;
  const d1=S.day===1;
  const spoken=(S.speechContext?.spoken||[]).filter(s=>pl(s)?.alive&&s!==p.seat);
  const ref=spoken.length?seatLabel(spoken[spoken.length-1]):"后面发言的人";
  if(!sp)return "我先把话放轻一点：第一轮信息太少，不能凭感觉定人。后面重点看谁急着把别人推出去，谁解释自己的理由最完整。";
  if(p.role==="werewolf")return d1?"我现在只评价已经说过话的人。"+ref+"的说法我先记着，但不急着投死，等后面有没有人顺着这个方向带节奏。":"我更关注昨天投票里谁顺势补票。"+seatLabel(top)+"这个位置需要把自己的票讲清楚。";
  if(p.role==="seer"&&p.checked.length){const c=p.checked[p.checked.length-1];return d1?"我手里有一点判断，但第一天先看大家怎么接话。现在别急着定死，重点看谁在没有证据时强行推人。":"我有比较明确的判断，"+seatLabel(c.seat)+"偏"+c.result+"。今天围绕这个信息和昨天投票继续看。";}
  if(d1)return "我目前只看已经发过言的人。"+ref+"的表达先记一笔，后面要看有没有人跟得太顺。";
  return "我只评论已经说过话的人。"+seatLabel(top)+"在历史投票和公开信息里的疑点需要被追问。";
}

function roleGoalText(p){
  const plan=p.plan||"default";
  const role=p.role;
  const claims=S.claims||[];
  const hasCounterClaim=claims.filter(c=>c.type==="role_claim"&&(c.result==="预言家"||c.result==="seer")).length>=2;
  const hasSeerClaim=claims.some(c=>c.type==="role_claim"&&(c.result==="预言家"||c.result==="seer"));
  const seerHasWolf=p.role==="seer"&&p.checked.some(c=>c.result==="狼人"&&pl(c.seat)?.alive);
  const pressure=tablePressure().find(x=>x.seat===p.seat)?.pressure||0;
  const underPressure=pressure>=.58||(alive().filter(x=>x.voteLean===p.seat).length>=2);
  const isEndgame=alive().length<=4;
  const phaseTexts={
    bold:{
      werewolf:hasCounterClaim?"可以考虑跳预言家对跳搅乱局面，也可以继续隐藏。":"制造合理怀疑，主动给出归票目标。",
      seer:"有查杀就尽早跳预言家报查验带队。验到好人可以观察局势决定是否跳。",
      witch:"主动使用解药和毒药改变局势，白天可以适度亮身份带队。",
      hunter:"适当亮枪威慑，出局时基于证据开枪带走狼人。",
      guard:"根据死亡信息反推刀口，大胆守护核心好人位。",
      villager:"主动带队归票，点名怀疑对象并给出理由。"
    },
    cautious:{
      werewolf:"模拟好人视角说话，踩人留余地不急于猛攻，优先保护自己不被关注。",
      seer:"被扛推风险升高前不主动跳身份，先通过发言引导局面。",
      witch:"白天保持中立，不主动跳女巫，用药以保险为主。",
      hunter:"前期不暴露身份，被扛推或被刀时再亮枪。",
      guard:"不暴露守护逻辑，避免被反推刀口。",
      villager:"多问问题少踩人，先观察再站队。"
    },
    default:{
      werewolf:"像普通好人一样发言，制造合理怀疑但不要急冲；重点找可公开解释的疑点，避免和狼同伴显得太近。",
      seer:"根据查验结果决定是否暗示或公开。被推、查到狼人或有人冒充时可以明确。",
      witch:"用公开结果推理，不要直接说救、毒、药还有没有；必要时用强势但可解释的方式保护好人。",
      hunter:"保持威慑但不要无理由跳身份；被集中怀疑时给出清楚反打对象和理由。",
      guard:"保护关键好人但不要报守护；从公开发言和票型解释自己的判断。",
      villager:"没有夜间信息，只能从公开发言、票型、死亡结果推理，推动大家给出明确理由。"
    },
    aggressive:{
      werewolf:hasCounterClaim?"跳预言家对跳，主动制造混乱。":"主动制造怀疑目标，敢于硬踩好人核心位。",
      seer:"拿到信息尽早公开，用查杀定义局面。",
      witch:"敢于用毒药清理高嫌疑目标。",
      hunter:"适度亮枪威慑，出局时明确带走目标。",
      guard:"大胆守护自己认为的好人核心。",
      villager:"主动点名、压人、推动归票。"
    },
    complicated:{
      werewolf:"仔细分析每个人的发言和票型矛盾，制造复杂的逻辑链让好人分不清真假。",
      seer:"深度分析查验收益，选择最佳时机报查验。",

  if(role==="witch"&&(underPressure||isEndgame||claims.some(c=>c.type==="role_claim"&&(c.result==="女巫"||c.result==="witch"))))base+=" 如果你被推、有人冒充女巫或残局需要统一好人票，可以公开女巫身份带队；公开后仍不要随便说具体救毒对象。";
  if(role==="hunter"&&underPressure)base+=" 你正在承压，可以考虑公开猎人身份自保和威慑，但不要太早锁死枪口。";
  if(role==="guard"&&(underPressure||isEndgame||claims.some(c=>c.type==="role_claim"&&(c.result==="守卫"||c.result==="guard"))))base+=" 守卫通常隐藏；只有被推、有人冒充守卫或残局排身份时才考虑公开，公开也不要完整报守护路线。";
  if(isEndgame&&role==="werewolf")base+=" 残局轮次管理优先，要有明确归票目标。";
  if(isEndgame&&role==="seer")base+=" 残局阶段必须把查验信息交代清楚，帮助好人做最后判断。";
  return base;
}

function buildSpeechTask(p){
  const sc=S.speechContext||{};
  const spoken=(sc.spoken||[]).map(seatLabel).join("、")||"暂无";
  const remaining=(sc.remaining||[]).map(seatLabel).join("、")||"暂无";
  const firstFew=S.day===1&&(sc.spoken||[]).length<2;
  const roleGoal=roleGoalText(p);
  const earlyRule=firstFew?"第一天前两位发言信息极少：不能说任何人‘刚才发言有问题、前后矛盾、站边太快、发言少’，不能凭初始怀疑值定人。你可以说先听一圈、观察谁无证据推人、要求后面的人说明理由。":"";
  const claimRule="身份策略必须显式选择：hide=继续隐藏；soft_claim=暗示但不明跳；true_claim=公开真实身份；fake_claim=伪装成其他身份；counter_claim=对跳别人的身份。不要每轮都跳身份，只有局势需要时才跳。狼人可以假跳但不能承认狼人或暴露狼队信息；预言家公开时只能报真实查验；女巫/守卫公开也不要随便报具体救毒或守护对象。voteReason会公开给所有玩家，必须只基于公开发言、票型、身份声明和可见结果；真实动机、私有信息、狼队收益只能写进note，不能写进voteReason。狼人voteReason必须伪装成好人视角，可以栽赃、借势或放大矛盾。本轮发言禁止只说“我先观察/信息太少/再看一轮/暂时不站边”等模糊表态。"+(firstFew?"第一天前两位不强制踩死具体玩家；如果还没有可评价对象，可以点名后置位需要解释的问题或说明你会重点观察哪个座位的后续理由。":"即使只有第一印象，也要点名一个具体座位并给出为什么。");
  return "请像真人玩家一样公开发言并给出投票倾向，同时更新你的临场判断。你的本轮目标："+roleGoal+" 已发言玩家："+spoken+"。尚未发言玩家："+remaining+"。只能评价已发言玩家的今日发言；尚未发言玩家只能基于历史票型、昨夜公开结果或旧发言评价。"+earlyRule+claimRule+" 发言要具体、口语化、有立场，但不要机械列点。输出JSON：{\"note\":\"自己的草稿，包含你为什么这样说，不给其他玩家看\",\"claimIntent\":\"hide/soft_claim/true_claim/fake_claim/counter_claim\",\"claimRole\":\"seer/witch/hunter/guard/villager/null\",\"claimContent\":\"如果本轮跳身份或暗示身份，这里写公开身份策略；否则为空\",\"speech\":\"公开发言，40到180字，必须提到具体座位或明确局面；禁止暴露夜间私密行动\",\"voteLean\":座位号|null,\"voteReason\":\"投票理由\",\"accuses\":[座位号],\"protects\":[座位号],\"readUpdates\":{\"座位号\":0到1},\"roleGuesses\":{\"座位号\":\"seer/witch/hunter/guard/villager/wolf/unknown\"},\"claims\":[{\"type\":\"role_claim/seer_check/other\",\"target\":座位号|null,\"result\":\"结果\"}]}";
}

function isUnsafeSpeech(p,speech){
  const text=String(speech||"");
  const patterns=[...(LEAK_PATTERNS[p.role]||[])];
  const claimsSeer=/我是预言家|我跳预言家|起跳预言家|我也跳预言家/.test(text);
  if(p.role!=="seer"||!claimsSeer)patterns.push(/查验结果/);
  return patterns.some(re=>re.test(text));
}

function hasClaimLogicContradiction(p,speech){
  const text=String(speech||"");
  const selfClaims={
    seer:/我是预言家|我跳预言家|起跳预言家|我也跳预言家/.test(text),
    witch:/我是女巫|我跳女巫|起跳女巫/.test(text),
    hunter:/我是猎人|我跳猎人|起跳猎人/.test(text),
    guard:/我是守卫|我跳守卫|起跳守卫/.test(text)
  };
  const otherTrue={
    seer:/\d+号[^。；\n]*(真预言家|是真的预言家|才是真预言家)|真预言家[^。；\n]*\d+号/.test(text),
    witch:/\d+号[^。；\n]*(真女巫|是真的女巫|才是真女巫)|真女巫[^。；\n]*\d+号/.test(text),
    hunter:/\d+号[^。；\n]*(真猎人|是真的猎人|才是真猎人)|真猎人[^。；\n]*\d+号/.test(text),
    guard:/\d+号[^。；\n]*(真守卫|是真的守卫|才是真守卫)|真守卫[^。；\n]*\d+号/.test(text)
  };
  if(Object.keys(selfClaims).some(role=>selfClaims[role]&&otherTrue[role]))return true;
  if(/(查验|验|查).*?(一样|一致|相同|对得上)[^。；\n]*(所以|证明|那么|因此)[^。；\n]*(真预言家|是真的预言家|预言家是真的)/.test(text))return true;
  if(/(所以|证明|那么|因此)[^。；\n]*(真预言家|是真的预言家|预言家是真的)[^。；\n]*(查验|验|查).*?(一样|一致|相同|对得上)/.test(text))return true;
  const ownRole=p?.publicClaim?.role;
  if(ownRole&&selfClaims[ownRole]&&otherTrue[ownRole])return true;
  return false;
}

function unsafePublicReason(reason){
  const text=String(reason||"");
  return /他是好人|她是好人|这是好人|被推出去的是好人|推好人|出好人|保护狼队友|保护队友|我们狼|狼队收益|狼队友|刀口|我知道.*不是狼|不是狼人所以|真实身份/.test(text);
}

function fallbackPublicReason(p,target){
  const label=seatLabel(target);
  if(p?.role==="werewolf")return label+"这轮解释不够完整，投票倾向也有点顺着场上风向走，我更想先处理这个位置。";
  if(p?.role==="seer"&&p.checked?.some(c=>c.seat===Number(target)&&c.result==="狼人"))return label+"是我查验里最明确的问题位置，今天应该优先处理。";
  if(p?.role==="hunter")return label+"一直没有把自己的怀疑链讲清楚，我不想让票继续散。";
  if(p?.role==="witch")return label+"的公开发言和投票态度最需要解释，我先把票压在这里。";
  return label+"这轮公开发言和投票态度不够清楚，我认为需要优先处理。";
}

function sanitizePublicReason(p,target,reason){
  const text=simplifyJargon(String(reason||"").slice(0,120));
  if(!text||unsafePublicReason(text))return fallbackPublicReason(p,target);
  return text;
}

function referencesUnspokenToday(speech){
  const text=String(speech||"");
  const remaining=new Set((S.speechContext?.remaining||[]).map(Number));
  if(!remaining.size)return false;
  const patterns=[/(\d+)号[^。；，,]*(发言少|没怎么发言|发言较少|刚才|前面说|站边太快|前后不一|逻辑矛盾|理由不完整)/g,/(发言少|没怎么发言|发言较少|刚才|前面说|站边太快|前后不一|逻辑矛盾|理由不完整)[^。；，,]*(\d+)号/g];
  return patterns.some(re=>{
    re.lastIndex=0;
    let m;
    while((m=re.exec(text))){
      const seat=Number(m[1]||m[2]);
      if(remaining.has(seat))return true;
    }
    return false;
  });
}

function safeSpeechFallback(p){
  const top=Number(Object.entries(p.suspicion).filter(([s])=>pl(s)?.alive).sort((a,b)=>b[1]-a[1])[0]?.[0]||alive().find(x=>x.seat!==p.seat)?.seat);
  const sp=(S.speechContext?.spoken||[]).length;
  const d1=S.day===1;
  const spoken=(S.speechContext?.spoken||[]).filter(s=>pl(s)?.alive&&s!==p.seat);
  const ref=spoken.length?seatLabel(spoken[spoken.length-1]):"已经发过言的人";
  if(!sp)return "第一轮信息太少，我不急着点死任何人。后面重点看谁没有证据就急着推人，谁给出的理由最经得起追问。";
  if(p.role==="werewolf")return d1?"我先只看已经发过言的人。"+ref+"的说法可以先记着，但现在不能急着定人，后面谁顺势推票更关键。":seatLabel(top)+"这轮有人带节奏太快了，我先不急着跟。谁跟票跟得最舒服，谁就最有问题。";
  if(p.role==="witch")return (d1?"晚上没死人的结果先不要过度解读":"平安夜不能直接说明谁的身份")+"，我更想看谁第一个拿这个结果说话，"+(d1?seatLabel(top)+"需要再听听他的后续发言。":seatLabel(top)+"的说法需要被追问。");
  if(p.role==="guard")return "晚上结果只能作为公开信息用。"+(d1?"我先听听大家的说法再判断。":"我会先信逻辑清楚的人，同时压一压"+seatLabel(top)+"这种说法不周全的位置。");
  if(p.role==="seer"&&p.checked.length)return d1?"我有一点判断，但第一天不急着摊开。先看已经发过言的人怎么给理由，后面谁强行推人我会重点记。":"我有一个更明确的信息。今天重点听"+seatLabel(top)+"怎么解释自己的投票，别让狼人把节奏带跑。";
  if(d1)return "我目前先听已经发过言的人。"+seatLabel(top)+"的发言需要再留意。";
  return "只看公开信息，晚上的结果先不要过度解读。现在更关键的是谁在抢着说话、谁在跟风投票，"+seatLabel(top)+"的说法我认为还不干净。";
}

function pressureLabel(v){
  if(v>=.76)return "很高";
  if(v>=.56)return "偏高";
  if(v>=.36)return "观察";
  return "较低";
}

function tablePressure(){
  return alive().map(target=>{
    const observers=alive().filter(p=>p.seat!==target.seat);
    const avg=observers.length?observers.reduce((s,p)=>s+(p.suspicion[target.seat]||.35),0)/observers.length:0;
    const trust=observers.length?observers.reduce((s,p)=>s+(p.trust[target.seat]||.45),0)/observers.length:0;
    const votes=observers.filter(p=>p.voteLean===target.seat).length;
    return {seat:target.seat,name:playerLabel(target),pressure:clamp01(avg),trust:clamp01(trust),votes};
  }).sort((a,b)=>b.pressure-a.pressure);
}

function tableReadHtml(){
  if(!S.players.length)return "<div class='review-block'>游戏尚未开始。</div>";
  const infoFew=S.day<=1&&!(S.speechContext?.spoken||[]).length&&!S.history.votes.length;
  if(infoFew)return "<div class='review-block'><b>公开信息不足</b><br>第一天发言刚开始，场上还没有足够公开发言和票型。先听完一圈再判断。</div>";
  const rows=tablePressure().map(x=>`<div class="table-read-row"><span>${esc(x.name)}</span><div class="table-read-bar"><span style="width:${Math.round(x.pressure*100)}%"></span></div><span>${pressureLabel(x.pressure)}</span></div>`).join("");
  const voteRows=alive().map(p=>`<div class="review-block"><b>${esc(playerLabel(p))}</b> 可能投向：${p.voteLean?esc(seatLabel(p.voteLean)):"未明确"}${p.voteReason?"<br><span style='color:#9ca6c8'>说法："+esc(p.voteReason)+"</span>":""}</div>`).join("");
  const my=me();
  const mine=my?Object.entries(my.suspicion).filter(([s])=>pl(s)?.alive).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([s])=>seatLabel(s)).join("、"):"暂无";
  return `<div class="review-block"><b>提示</b><br>这是根据公开发言、票型和AI临场判断整理的辅助风向，不代表真实身份或客观事实。</div><div class="review-block"><b>你的当前感觉</b><br>更在意的位置：${esc(mine||"暂无")}</div><div class="review-block"><b>场上讨论压力</b><div class="table-read-grid" style="margin-top:8px">${rows}</div></div><div class="review-block"><b>可能投票方向</b>${voteRows}</div>`;
}

function normalizeSeatList(v){
  if(!v)return[];
  const arr=Array.isArray(v)?v:[v];
  return arr.map(Number).filter(s=>pl(s)&&pl(s).alive);
}

function recordAIState(p,ans,speech){
  const claimIntent=String(ans.claimIntent||"hide");
  const claimRole=String(ans.claimRole||"").toLowerCase();
  if(["true_claim","fake_claim","counter_claim","soft_claim"].includes(claimIntent)&&claimRole&&claimRole!=="null"){
    const claim={day:S.day,intent:claimIntent,role:claimRole,text:String(ans.claimContent||speech||"").slice(0,120)};
    p.publicClaim=claim;
    p.claimHistory.push(claim);
    S.claims.push({day:S.day,from:p.seat,type:"claim_intent",target:null,result:claimRole,text:String(speech).slice(0,80)});
    if(claimIntent!=="soft_claim")S.claims.push({day:S.day,from:p.seat,type:"role_claim",target:null,result:claimRole,text:String(speech).slice(0,80)});
  }
  const updates=ans.readUpdates||{};
  Object.entries(updates).forEach(([s,v])=>{if(pl(s)&&Number(s)!==p.seat)p.suspicion[s]=clamp01(v)});
  normalizeSeatList(ans.accuses||ans.suspects).forEach(s=>{if(s!==p.seat)p.suspicion[s]=clamp01((p.suspicion[s]||.4)+.08)});
  normalizeSeatList(ans.protects||ans.trusts).forEach(s=>{if(s!==p.seat){p.trust[s]=clamp01((p.trust[s]||.45)+.08);p.suspicion[s]=clamp01((p.suspicion[s]||.4)-.06)}});
  const rr=ans.roleGuesses||{};
  Object.entries(rr).forEach(([s,r])=>{if(pl(s)&&Number(s)!==p.seat&&String(r).length<20)p.roleGuesses[s]=String(r)});
  const claims=Array.isArray(ans.claims)?ans.claims:[];
  claims.forEach(c=>{
    const type=String(c.type||"claim").slice(0,30);
    const target=Number(c.target)||null;
    const result=c.result?String(c.result).slice(0,20):"";
    S.claims.push({day:S.day,from:p.seat,type,target:pl(target)?target:null,result,text:String(speech).slice(0,80)});
  });
  detectClaimsFromSpeech(p,speech);
}

function detectClaimsFromSpeech(p,speech){
  const text=String(speech||"");
  const check=text.match(/(?:查验|验了|查了|验)(\d+)号[^，。；\n]*(狼人|好人|金水|查杀)/);
  if(check){
    const target=Number(check[1]);
    const result=check[2]==="狼人"||check[2]==="查杀"?"狼人":"好人";
    if(pl(target))S.claims.push({day:S.day,from:p.seat,type:"seer_check",target,result,text:text.slice(0,80)});
  }
  const roleClaim=text.match(/(?:我是|我跳|起跳|认)(预言家|女巫|猎人|守卫|村民)/);
  if(roleClaim){
    const roleMap={预言家:"seer",女巫:"witch",猎人:"hunter",守卫:"guard",村民:"villager"};
    const role=roleMap[roleClaim[1]]||roleClaim[1];
    p.publicClaim={day:S.day,intent:p.role===role?"true_claim":"fake_claim",role,text:text.slice(0,120)};
    p.claimHistory=p.claimHistory||[];p.claimHistory.push(p.publicClaim);
    S.claims.push({day:S.day,from:p.seat,type:"role_claim",target:null,result:role,text:text.slice(0,80)});
  }
}

function updateBeliefsFromSpeech(sp,speech,vi,vr){
  const speakRole=sp.role;
  for(const p of S.players){
    if(!p.alive||p.seat===sp.seat)continue;
    // Existing: vote intent influence
    if(vi&&vi!==p.seat)p.suspicion[vi]=clamp01((p.suspicion[vi]||.35)+.08);
    if(speakRole==="werewolf"&&p.role!=="werewolf")p.suspicion[sp.seat]=clamp01((p.suspicion[sp.seat]||.35)+.03);
    // Content-based: detect "查杀" or "查验" → speaker likely claims seer
    if(speech.includes("查杀")||speech.includes("查验")||speech.includes("验了")){
      if(p.role==="seer"&&p.seat!==sp.seat)p.suspicion[sp.seat]=clamp01((p.suspicion[sp.seat]||.35)+.12);
    }
    // Detect agreement: "同意x号" / "跟x号" / "x号说得对"
    const agreeMatch=speech.match(/(\d+)号.*说得对|同意(\d+)号|跟(\d+)号|站边(\d+)号/);
    if(agreeMatch){
      const targetSeat=Number(agreeMatch[1]||agreeMatch[2]||agreeMatch[3]||agreeMatch[4]);
      if(targetSeat===p.seat){p.suspicion[sp.seat]=clamp01((p.suspicion[sp.seat]||.35)-.12);p.trust[sp.seat]=clamp01((p.trust[sp.seat]||.45)+.12)}
    }
  }
}

async function votePhase(){
  if(S.winner)return;
  // Pre-vote discussion
  setPhase("vote");
  dialog("最后讨论环节，每人一句话拉票或表态。","系统","","vote","system");
  await playQueue();
  // Record pre-discussion intents
  const preSnap={};
  for(const p of alive()){
    const curInt=p.voteLean;
    preSnap[p.seat]=curInt;
  }
  // AI short discussion contributions
  for(const p of alive()){
    if(S.winner)return;
    if(p.isHuman){
      const safe=await new Promise(resolve=>{
        const html=`<textarea id="finalTalk" style="min-height:60px" placeholder="最后说一句话拉票或解释你的想法..."></textarea>`;
        showAction("你的最后发言","用一句话影响别人。",html);
        const btn=document.createElement("button");btn.className="btn";btn.textContent="发 送";
        btn.onclick=()=>{
          const t=$("finalTalk")?.value?.trim()||"我没什么要补充的了。";
          if(!humanLeakWarning(t))return;
          hideAction();
          resolve(simplifyJargon(t.slice(0,120)));
        };
        $("actionBody").appendChild(btn);
      });
      enqueue({type:"speech",title:playerLabel(p)+"最后发言",text:safe,atmo:"vote",log:true,visible:"public",speakerSeat:p.seat,nextText:"下一位 ▸"});
      await playQueue();
    }else{
      const fb=seatLabel(p.seat)+"说："+simplifyJargon("我觉得"+playerLabel(p.voteLean||alive().find(x=>x.seat!==p.seat))+"嫌疑最大，大家考虑一下。").slice(0,80);
      setInlineBusy("系统",playerLabel(p)+"正在整理最后发言，请稍等。","vote",p.seat);
      let ans={speech:fb};
      try{
        ans=await retryAI(p,"请用一句话简短表达你的最终投票倾向和理由，30-60字，口语化。输出{\"speech\":\"一句话\"}",{speech:fb},1);
      }finally{
        clearInlineBusy();
      }
      const talk=simplifyJargon(String(ans.speech||fb.speech).slice(0,120));
      enqueue({type:"speech",title:playerLabel(p)+"最后发言",text:talk,atmo:"vote",log:true,visible:"public",speakerSeat:p.seat,nextText:"下一位 ▸"});
      await playQueue();
    }
  }
  toast("正在让所有 AI 玩家做出最终投票决定，可能需要一小会儿...",6000);
  setInlineBusy("系统","大家正在整理最后的投票想法，需要 AI 逐人计算，可能要等一会儿，请不要刷新页面。","vote");
  const voters=alive().filter(p=>!p.isHuman);
  let voteDone=0;
  await Promise.all(voters.map(async p=>{
    if(S.winner)return;
    const candidates=alive().filter(x=>x.seat!==p.seat);
    const fb={target:p.voteLean&&candidates.some(x=>x.seat===p.voteLean)?p.voteLean:aiPick(p,candidates,true),reason:p.voteReason||""};
    let ans=fb;
    if(S.aiMode!=="save"){
      ans=await retryAI(p,"最后讨论已经结束，请根据全场公开发言、最后表态和票型，重新决定正式投票对象。不能投自己。输出{\"target\":座位号,\"publicReason\":\"公开投票理由，只能基于公开信息；狼人必须伪装成好人视角，可以栽赃或放大矛盾，但不能暴露真实狼队动机\",\"privateReason\":\"真实思考，可包含私有信息，不公开\"}",{target:fb.target,publicReason:fb.reason,privateReason:""},1);
    }
    if(candidates.some(x=>x.seat===Number(ans.target))){
      p.voteLean=Number(ans.target);
      p.voteReason=sanitizePublicReason(p,p.voteLean,ans.publicReason||ans.reason||p.voteReason||"");
      p.privateVoteReason=String(ans.privateReason||"").slice(0,180);
    }
    voteDone++;
    setInlineBusy("系统","大家正在整理最后的投票想法（"+voteDone+"/"+voters.length+"）...","vote");
  }));
  clearInlineBusy();
  // Track persuasion changes
  for(const p of alive()){
    const postInt=p.voteLean||alive().find(x=>x.seat!==p.seat)?.seat;
    if(preSnap[p.seat]&&preSnap[p.seat]!==postInt){
      S.voteChangeNotes.push({day:S.day,from:p.seat,pre:preSnap[p.seat],post:postInt});
    }
  }
  // Actual voting
  dialog("现在开始投票，请选择放逐对象。","系统","","vote","system");
  await playQueue();
  const votes=[];
  for(const p of alive()){
    if(S.winner)return;
    if(p.isHuman){
      const candidates=alive().filter(x=>x.seat!==p.seat);
      const seat=await selectTarget("投票放逐","选择你要投票的玩家。",candidates);
      votes.push({from:p.seat,to:seat});
    }else{
      const target=p.voteLean&&pl(p.voteLean)?.alive&&p.voteLean!==p.seat?p.voteLean:aiPick(p,alive().filter(x=>x.seat!==p.seat),true);
      const reason=sanitizePublicReason(p,target,p.voteReason||"");
      votes.push({from:p.seat,to:target,reason,privateReason:p.privateVoteReason||""});
    }
  }
  const counts={};votes.forEach(v=>counts[v.to]=(counts[v.to]||0)+1);
  const max=Math.max(...Object.values(counts));
  const tied=Object.entries(counts).filter(([,c])=>c===max).map(([s])=>Number(s));
  let out=null;
  if(tied.length>1){
    dialog(formatVoteBlock(votes,null,tied,max),"投票结果","平票规则","vote","system");
    S.history.votes.push({day:S.day,votes,out:null});
    await playQueue();
  }else{
    out=tied[0];
    S.history.votes.push({day:S.day,votes,out});
    dialog(formatVoteBlock(votes,out,null,max),"投票结果","","vote","system",out,true);
    await playQueue();
    killPlayer(out,"投票放逐");
    const lw=await inputLastWords(pl(out));
    dialog(lw,seatLabel(out)+"遗言","","vote","system",out,true);
    await playQueue();
    await handleDeathSkills([out],"vote").then(async()=>{
      await playQueue();
    });
  }
  if(!checkWin())await startNight();
}

// ===== DEATH / WIN =====
function killPlayer(seat,cause){
  const p=pl(seat);if(!p||!p.alive)return;
  p.alive=false;p.deathCause=cause;
  const publicCause=(cause==="投票放逐"||cause==="猎人开枪")?"（"+cause+"）":"";
  addLog("system",seatLabel(seat)+"出局",seatLabel(seat)+"已出局"+publicCause+"。","public");
}

async function handleDeathSkills(deaths,source){
  let chain=[...deaths];
  while(chain.length){
    const seat=chain.shift();
    const p=pl(seat);if(!p||p.role!=="hunter"||p.shotUsed)continue;
    if(p.deathCause==="女巫毒杀"){addLog("system","猎人未发动",seatLabel(seat)+"没有发动技能。","public");continue;}
    p.shotUsed=true;
    const candidates=alive().filter(x=>x.seat!==seat);
    if(!candidates.length)continue;
    let target;
    if(p.isHuman){
      target=await selectTarget("猎人开枪","你可以开枪带走一人。",candidates);
    }else target=aiPick(p,candidates,true);
    if(target){
      dialog(seatLabel(seat)+"猎人带走了"+seatLabel(target)+"。","猎人开枪","","vote","system",target,true);
      await playQueue();
      killPlayer(target,"猎人开枪");
      chain.push(target);
    }
  }
}

function checkWin(){
  const a=alive();const wolves=a.filter(p=>p.role==="werewolf").length;
  const good=a.length-wolves;
  if(wolves===0)return endGame("good");
  if(wolves>=good)return endGame("wolf");
  return false;
}

function endGame(winner){
  S.winner=winner;
  dialog(winner==="good"?"好人阵营胜利，所有狼人已出局！":"狼人阵营胜利，狼人数量已不少于好人！","游戏结束","","reveal","system");
  playQueue().then(()=>{
    if(!S.winner)return;
    const items=S.players.map(p=>`<div style="padding:8px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;font-size:13px"><b>${esc(playerLabel(p))}${p.isHuman?"（你）":""}</b>：${roleName(p.role)} · ${p.alive?"存活":"出局："+p.deathCause}</div>`).join("");
    const review=buildGameReview();
    $("actionTitle").textContent="🏆 游戏结束 · 全剧回顾";
    $("actionDesc").textContent=winner==="good"?"好人阵营获胜":"狼人阵营获胜";
    $("actionBody").innerHTML=items+"<div style='max-height:280px;overflow-y:auto'>"+review+"</div><button class='btn' id='newGameBtn' style='margin-top:12px'>再来一局</button>";
    $("actionModal").classList.add("show");
    $("newGameBtn").onclick=()=>{$("actionModal").classList.remove("show");resetAll()};
  });
  return true;
}

function buildGameReview(){
  const parts=[];
  const nights=S.history?.nights||[];
  const votes=S.history?.votes||[];
  const persuasions=S.voteChangeNotes||[];
  const nightParts=[],voteParts=[],turning=[];
  for(let d=1;d<=S.day;d++){
    const n=nights.find(n=>n.day===d);
    if(n){
      const w=n.wolfTarget?"狼刀"+seatLabel(n.wolfTarget):"无狼刀";
      const g=n.guardTarget?"守卫守"+seatLabel(n.guardTarget):"无守";
      const s=n.seerTarget?"预言家验"+seatLabel(n.seerTarget):"无验";
      const wc=n.witchSave?"女巫救人":"无救";
      const wp=n.witchPoisonTarget?"女巫毒"+seatLabel(n.witchPoisonTarget):"无毒";
      const deaths=(n.deaths||[]).map(s=>seatLabel(s)+"("+(((n.deathCauses||{})[s])||"死亡")+")").join("、")||"无死亡";
      nightParts.push("<b>第"+d+"夜</b>："+w+" · "+g+" · "+s+" · "+wc+" · "+wp+" → "+deaths);
      if((n.deaths||[]).length>1)turning.push("第"+d+"夜出现多死，局势加速："+deaths);
      if(!(n.deaths||[]).length)turning.push("第"+d+"夜平安夜，白天需要围绕保护/救人可能性谨慎发言。")
    }
    const v=votes.find(v=>v.day===d);
    if(v){
      const flow=v.votes.map(x=>seatLabel(x.from)+"→"+seatLabel(x.to)+(x.reason?"(公开理由："+esc(x.reason)+")":"")+(x.privateReason?"<br><span style='color:#9ca6c8'>真实动机："+esc(x.privateReason)+"</span>":"")).join("；");
      const out=v.out?seatLabel(v.out)+"被放逐":"平票无人出局";
      voteParts.push("<b>第"+d+"天投票</b>："+flow+" → "+out);
      if(v.out){
        const outp=pl(v.out);
        if(outp?.role==="werewolf")turning.push("第"+d+"天成功放逐狼人："+seatLabel(v.out)+"。");
        else turning.push("第"+d+"天放逐了好人："+seatLabel(v.out)+"，狼人获得节奏收益。")
      }
    }
    const dayPersuasions=persuasions.filter(p=>p.day===d);
    if(dayPersuasions.length){
      dayPersuasions.forEach(p=>{
        const name=seatLabel(p.from);
        turning.push(name+"发言后投票倾向从"+seatLabel(p.pre)+"转向"+seatLabel(p.post));
      });
    }
  }
  const playerSummary=S.players.map(p=>{
    const targeted=(votes.flatMap(v=>v.votes).filter(v=>v.to===p.seat).length);
    const votedWolf=votes.flatMap(v=>v.votes).filter(v=>v.from===p.seat&&pl(v.to)?.role==="werewolf").length;
    return `${esc(playerLabel(p))}：${roleName(p.role)}，${p.alive?"存活":"出局("+esc(p.deathCause||"未知")+")"}，投中过狼人 ${votedWolf} 次，被投 ${targeted} 次`;
  }).join("<br>");
  parts.push("<div class='review-block'><b>夜间行动链</b><br>"+(nightParts.join("<br>")||"无")+"</div>");
  parts.push("<div class='review-block'><b>投票流向</b><br>"+(voteParts.join("<br>")||"无")+"</div>");
  parts.push("<div class='review-block'><b>关键转折</b><br>"+(turning.slice(0,8).join("<br>")||"暂无明显转折")+"</div>");
  parts.push("<div class='review-block'><b>玩家表现摘要</b><br>"+playerSummary+"</div>");
  return parts.join("")||"暂无对局记录。";
}

  $("actionTitle").textContent="你的身份";
  $("actionDesc").textContent="";
  $("actionBody").innerHTML=`<div style="text-align:center;margin-bottom:12px"><img src="${portraitSrc(p)}" style="width:86px;height:86px;object-fit:cover;border-radius:18px;border:1px solid rgba(244,200,106,.35);margin-bottom:8px"><div style="font-size:48px;margin-bottom:4px">${ROLES[p.role].icon}</div><div style="font-size:22px;font-weight:900;color:#f4c86a">${roleName(p.role)}</div><div style="font-size:12px;color:#9ca6c8;margin-top:4px">${esc(playerLabel(p))} · ${ROLES[p.role].team==="wolf"?"狼人阵营":"好人阵营"}</div><div style="font-size:12px;color:#74b9ff;margin-top:4px">胜利条件：${ROLES[p.role].team==="wolf"?"狼人数量不少于存活好人时获胜":"所有狼人出局时获胜"}</div></div><div style="font-size:13px;color:#cdd5f2;line-height:1.7;background:rgba(255,255,255,.04);border-radius:14px;padding:12px"><b>简介：</b>${ROLES[p.role].brief}<br><br><b>玩法引导：</b>${ROLES[p.role].guide}<br><br><b style="color:#f4c86a">私有信息：</b><br>${priv}${wolfInfo}</div><button class="btn" style="margin-top:14px" onclick="document.getElementById('actionModal').classList.remove('show')">关闭</button>`;
  $("actionModal").classList.add("show");
};

loadCharacterOverrides();
loadConfig();
setAtmo("night");

// Temperature slider sync
$("tempSlider").addEventListener("input",()=>{$("tempVal").textContent=$("tempSlider").value});
document.querySelectorAll(".provider-pick").forEach(btn=>btn.addEventListener("click",()=>applyProviderDefaults(btn.dataset.provider,true)));

// Rules popup
$("showRulesBtn").onclick=()=>{
  $("actionTitle").textContent="游戏规则（10人局）";
  $("actionDesc").textContent="";
  $("actionBody").innerHTML=rulesHtml()+'<button class="btn" style="margin-top:14px" onclick="document.getElementById(\'actionModal\').classList.remove(\'show\')">关闭</button>';
  $("actionModal").classList.add("show");
};
</script>
</body>
</html>
